<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Matleek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
            z-index: 1;
        }
        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: block !important;
        }
        h1 {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .social-icons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .social-icons a {
            color: white;
            font-size: 30px;
            text-decoration: none;
            transition: 0.3s;
        }
        .social-icons a:hover {
            color: #ffdd00;
        }
    </style>
    <!-- ئەگەر ئایکۆنەکان دیار نەبوون ئەم لینکە یارمەتیدەرە -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="VID-20260531-WA0000.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <!-- لێرەدا هەردوو پاشگرەکەمان داناوە بۆ دڵنیایی، ناوی وێنەکەت بکە بە 25322 -->
        <img src="25322.jpeg" onerror="this.src='25322.jpg'" class="logo" alt="Logo">
        
        <h1>MATLEEK HOTEL</h1>

        <div class="social-icons">
            <a href="https://www.facebook.com/share/1YWGSWT3BM/?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/hotel_matleek" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@.hotel.matleek" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://wa.me/9647767709090" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://maps.app.goo.gl/zxHKtaS8zMMCfeqQ9" target="_blank"><i class="fas fa-map-marker-alt"></i></a>
        </div>
    </div>

</body>
</html>
